<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAOXI | 混淆器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Fira Code', monospace;
        }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 30px 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #9b59b6, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            color: #888;
            margin-top: 8px;
        }
        .vm-badge {
            display: inline-block;
            background: rgba(155,89,182,0.2);
            border: 1px solid #9b59b6;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            margin-left: 10px;
        }
        .main-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 350px;
        }
        .panel-title {
            font-size: 14px;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #9b59b6;
        }
        textarea {
            width: 100%;
            height: 380px;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #e0e0e0;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: #9b59b6;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 24px;
            background: transparent;
            border: 1.5px solid #2a2a2a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            border-color: #9b59b6;
            color: #9b59b6;
        }
        .info {
            margin-top: 30px;
            padding: 15px;
            background: #0d0d0d;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            font-size: 12px;
            color: #777;
        }
        .info h4 {
            color: #9b59b6;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>XIAOXI | 混淆器</h1>
        <div class="sub">Lua 代码混淆工具</div>
    </div>

    <div class="main-panel">
        <div class="panel">
            <div class="panel-title">📝 源代码</div>
            <textarea id="inputCode" placeholder='-- 粘贴 Lua 代码'></textarea>
        </div>
        <div class="panel">
            <div class="panel-title">🔒 混淆结果</div>
            <textarea id="outputCode" readonly placeholder="混淆后的代码..."></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button id="obfBtn">⚡ 开始混淆</button>
        <button id="copyBtn">📋 复制结果</button>
        <button id="saveBtn">💾 保存 .lua</button>
        <button id="clearBtn">🗑️ 清空</button>
    </div>

    <div class="info">
        <h4>🔧 工具说明</h4>
        <p>将代码编译为自定义字节码，通过虚拟机执行，提高代码安全性与逆向难度。</p>
    </div>
</div>

<script>
    let lastResult = '';

    // 随机字符串
    function randStr(len, mode = 'full') {
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const digits = '0123456789';
        let chars = lower + upper + digits;
        if (mode === 'full') chars += '_';
        let result = '';
        for (let i = 0; i < len; i++) {
            result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
    }

    // 简单的Lua代码 -> 自定义字节码编译器
    function compileToBytecode(source) {
        const lines = source.split('\n');
        const bytecode = [];
        const constTable = [];
        const varTable = new Map();
        
        let varCounter = 0;
        function getVarId(name) {
            if (!varTable.has(name)) {
                varTable.set(name, varCounter++);
            }
            return varTable.get(name);
        }
        
        function addConst(val) {
            const idx = constTable.indexOf(val);
            if (idx !== -1) return idx;
            constTable.push(val);
            return constTable.length - 1;
        }
        
        // 简化的字节码指令集
        // OP_NOP=0, OP_PUSH_CONST=1, OP_LOAD_VAR=2, OP_STORE_VAR=3, 
        // OP_CALL=4, OP_ADD=5, OP_SUB=6, OP_MUL=7, OP_DIV=8,
        // OP_PRINT=9, OP_RETURN=10, OP_JMP=11, OP_JMP_IF=12
        
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;
            
            // 处理 print("xxx")
            let match = line.match(/print\(["'](sslocal://flow/file_open?url=.%2B%3F&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)["']\)/);
            if (match) {
                const strIdx = addConst(match[1]);
                bytecode.push({op: 9, args: [strIdx]}); // OP_PRINT
                continue;
            }
            
            // 处理 local x = y + z
            match = line.match(/local\s+(\w+)\s*=\s*(\w+)\s*\+\s*(\w+)/);
            if (match) {
                const target = getVarId(match[1]);
                const left = getVarId(match[2]);
                const right = getVarId(match[3]);
                bytecode.push({op: 5, args: [target, left, right]}); // OP_ADD
                continue;
            }
            
            // 处理 local x = y
            match = line.match(/local\s+(\w+)\s*=\s*(\w+)/);
            if (match) {
                const target = getVarId(match[1]);
                const source = getVarId(match[2]);
                bytecode.push({op: 3, args: [target, source]}); // OP_STORE_VAR
                continue;
            }
            
            // 处理 function name(params) ... end (简化)
            match = line.match(/local\s+function\s+(\w+)\((.*)\)/);
            if (match) {
                const funcName = getVarId(match[1]);
                bytecode.push({op: 0, args: [funcName, 1]}); // 函数标记
                continue;
            }
            
            // 处理 return x
            match = line.match(/return\s+(\w+)/);
            if (match) {
                const varId = getVarId(match[1]);
                bytecode.push({op: 10, args: [varId]}); // OP_RETURN
                continue;
            }
            
            // 默认：作为字符串常量存储
            const strIdx = addConst(line);
            bytecode.push({op: 1, args: [strIdx]}); // OP_PUSH_CONST
        }
        
        return { bytecode, constTable, varCount: varCounter };
    }
    
    // 加密字节码
    function encryptBytecode(bytecode, constTable, varCount, key) {
        const bcStr = JSON.stringify(bytecode);
        const ctStr = JSON.stringify(constTable);
        const meta = `${varCount}|${bcStr}|${ctStr}`;
        
        let encrypted = '';
        for (let i = 0; i < meta.length; i++) {
            encrypted += String.fromCharCode(meta.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return btoa(encrypted);
    }
    
    // 生成虚拟机解释器 + 字节码
    function generateVM(bytecode, constTable, varCount, key) {
        const encryptedData = encryptBytecode(bytecode, constTable, varCount, key);
        
        const vmName = randStr(12);
        const dataName = randStr(10);
        const execName = randStr(8);
        const decodeName = randStr(10);
        const keyName = randStr(6);
        
        return `-- XIAOXI | 混淆器
return (function(...)
    local ${keyName} = "${key}"
    local ${dataName} = "${encryptedData}"
    
    local function ${decodeName}(data, k)
        local raw = ""
        local dec = (function(s)
            return (s:gsub('.', function(c)
                return string.char(bit32.bxor(c:byte(), k:byte((#raw) % #k + 1)))
            end))
        end)(data)
        return (function(s) return loadstring("return " .. s)() end)(dec)
    end
    
    local function ${vmName}(bytecode, constants, varCount)
        local vars = {}
        for i = 1, varCount do vars[i] = nil end
        
        local pc = 1
        local stack = {}
        
        local OP_NOP = 0
        local OP_PUSH_CONST = 1
        local OP_LOAD_VAR = 2
        local OP_STORE_VAR = 3
        local OP_CALL = 4
        local OP_ADD = 5
        local OP_SUB = 6
        local OP_MUL = 7
        local OP_DIV = 8
        local OP_PRINT = 9
        local OP_RETURN = 10
        local OP_JMP = 11
        local OP_JMP_IF = 12
        
        while pc <= #bytecode do
            local ins = bytecode[pc]
            local op = ins.op
            local args = ins.args or {}
            
            if op == OP_NOP then
            elseif op == OP_PUSH_CONST then
                table.insert(stack, constants[args[1] + 1])
            elseif op == OP_LOAD_VAR then
                table.insert(stack, vars[args[1] + 1])
            elseif op == OP_STORE_VAR then
                vars[args[1] + 1] = stack[#stack]
                table.remove(stack)
            elseif op == OP_ADD then
                local a = vars[args[1] + 1] or 0
                local b = vars[args[2] + 1] or 0
                vars[args[3] + 1] = a + b
            elseif op == OP_SUB then
                local a = vars[args[1] + 1] or 0
                local b = vars[args[2] + 1] or 0
                vars[args[3] + 1] = a - b
            elseif op == OP_MUL then
                local a = vars[args[1] + 1] or 0
                local b = vars[args[2] + 1] or 0
                vars[args[3] + 1] = a * b
            elseif op == OP_DIV then
                local a = vars[args[1] + 1] or 0
                local b = vars[args[2] + 1] or 0
                if b ~= 0 then vars[args[3] + 1] = a / b end
            elseif op == OP_PRINT then
                print(constants[args[1] + 1] or "")
            elseif op == OP_RETURN then
                return vars[args[1] + 1]
            elseif op == OP_JMP then
                pc = args[1]
            elseif op == OP_JMP_IF then
                if stack[#stack] then pc = args[1] end
            end
            pc = pc + 1
        end
        return nil
    end
    
    local decoded = ${decodeName}(${dataName}, ${keyName})
    local bc = decoded.bytecode
    local ct = decoded.constants
    local vc = decoded.varCount
    
    ${vmName}(bc, ct, vc)
end)()`;
    }
    
    // 主混淆函数
    function vmObfuscate(source) {
        if (!source.trim()) throw new Error('请输入代码');
        
        const { bytecode, constTable, varCount } = compileToBytecode(source);
        const key = randStr(16);
        
        return generateVM(bytecode, constTable, varCount, key);
    }
    
    // UI逻辑
    const inputArea = document.getElementById('inputCode');
    const outputArea = document.getElementById('outputCode');
    const obfBtn = document.getElementById('obfBtn');
    const copyBtn = document.getElementById('copyBtn');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    
    obfBtn.onclick = () => {
        const code = inputArea.value;
        if (!code.trim()) {
            alert('请输入代码');
            return;
        }
        try {
            obfBtn.textContent = '⏳ 处理中...';
            const result = vmObfuscate(code);
            outputArea.value = result;
            lastResult = result;
            obfBtn.textContent = '⚡ 开始混淆';
        } catch(e) {
            alert('处理失败: ' + e.message);
            obfBtn.textContent = '⚡ 开始混淆';
        }
    };
    
    copyBtn.onclick = async () => {
        if (!lastResult) {
            alert('请先进行混淆');
            return;
        }
        await navigator.clipboard.writeText(lastResult);
        alert('已复制');
    };
    
    saveBtn.onclick = () => {
        if (!lastResult) {
            alert('请先进行混淆');
            return;
        }
        const blob = new Blob([lastResult], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'XIAOXI_obf.lua';
        a.click();
        URL.revokeObjectURL(url);
    };
    
    clearBtn.onclick = () => {
        inputArea.value = '';
        outputArea.value = '';
        lastResult = '';
    };
</script>
</body>
</html>
